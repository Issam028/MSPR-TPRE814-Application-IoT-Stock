name: Country API CI

on:
  push:
    branches:
      - main
      - feat/simulation-iot
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: country/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: country/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build country API
        run: npm run build
