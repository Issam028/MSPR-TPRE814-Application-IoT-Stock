services:
  db_Brazil:
    image: mysql:8.4
    container_name: mysql_Brazil
    restart: always
    environment:
      # Configuration de la base demandée [cite: 147, 183]
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-brazil_db}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      # Chemin mis à jour vers ton fichier init.sql
      - ./country/init.sql:/docker-entrypoint-initdb.d/init.sql
      # Persistance des données pour ne rien perdre au redémarrage
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db_Colombia:
    image: mysql:8.4
    container_name: mysql_Colombia
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${COLOMBIA_DATABASE:-colombia_db}
    ports:
      - "${COLOMBIA_MYSQL_PORT:-3308}:3306"
    volumes:
      - ./country/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_colombia_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api_brazil:
    build: ./country/api
    container_name: api_brazil
    restart: always
    ports:
      - "${BRAZIL_API_PORT:-3000}:3000"
    depends_on:
      db_Brazil:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db_Brazil
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-root}
      DB_NAME: ${MYSQL_DATABASE:-brazil_db}

  api_colombia:
    build: ./country/api
    container_name: api_colombia
    restart: always
    ports:
      - "${COLOMBIA_API_PORT:-3002}:3000"
    depends_on:
      db_Colombia:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db_Colombia
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-root}
      DB_NAME: ${COLOMBIA_DATABASE:-colombia_db}

  api_central:
    build: ./central/api
    container_name: api_central
    restart: always
    ports:
      - "${CENTRAL_API_PORT:-3001}:3001"
    depends_on:
      - api_brazil
      - api_colombia
    environment:
      PORT: 3001
      BRAZIL_API_URL: ${BRAZIL_API_URL:-http://api_brazil:3000}
      COLOMBIA_API_URL: ${COLOMBIA_API_URL:-http://api_colombia:3000}

  app_central:
    build: ./central/app
    container_name: app_central
    restart: always
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - api_central

  iot_simulator:
    build: ./simulator
    container_name: iot_simulator
    restart: always
    profiles:
      - dev
    depends_on:
      - api_brazil
    environment:
      SIMULATOR_API_URL: ${SIMULATOR_API_URL:-http://api_brazil:3000}
      SIMULATOR_ENTREPOT_ID: ${SIMULATOR_ENTREPOT_ID:-COFFEE-01}
      SIMULATOR_INTERVAL_MS: ${SIMULATOR_INTERVAL_MS:-5000}
      SIMULATOR_MODE: ${SIMULATOR_MODE:-mixed}

volumes:
  mysql_data:
  mysql_colombia_data: